services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - check-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  check-service:
    user: root
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - TASK_SERVICE_URL=http://host.docker.internal:8001
      - ENVIRONMENT=development
      - DEBUG=true
      - JWT_SECRET_KEY=your-secret-key-change-in-production-min-32-chars-long
      - JWT_ALGORITHM=HS256
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8000
      - LOG_LEVEL=INFO
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./app:/app/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - check-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  check-network:
    driver: bridge

volumes:
  redis-data:
