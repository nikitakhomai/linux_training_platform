  # ==========================================================================
  # BUILD STAGE
  # ==========================================================================

  build-auth:
    runs-on: ubuntu-latest
    needs: [test-auth]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: false
          load: true
          tags: |
            auth-service:${{ github.sha }}
            auth-service:latest

  build-task:
    runs-on: ubuntu-latest
    needs: [test-task]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./task-service
          push: false
          load: true
          tags: |
            task-service:${{ github.sha }}
            task-service:latest

  build-check:
    runs-on: ubuntu-latest
    needs: [test-check]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./check-service
          push: false
          load: true
          tags: |
            check-service:${{ github.sha }}
            check-service:latest

  build-orchestration:
    runs-on: ubuntu-latest
    needs: [test-orchestration]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./orchestration-service
          push: false
          load: true
          tags: |
            orchestration-service:${{ github.sha }}
            orchestration-service:latest

  build-progress:
    runs-on: ubuntu-latest
    needs: [test-progress]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./progress-service
          push: false
          load: true
          tags: |
            progress-service:${{ github.sha }}
            progress-service:latest

  build-frontend:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: |
            frontend:${{ github.sha }}
            frontend:latest

