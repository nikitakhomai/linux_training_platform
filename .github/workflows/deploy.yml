name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

jobs:
  # ==========================================================================
  # TEST STAGE
  # ==========================================================================

  test-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd auth-service
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd auth-service
          pytest tests/ -v --cov=src --cov-report=term
    if: github.event_name == 'push' || github.event_name == 'pull_request'

  test-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd task-service
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd task-service
          pytest tests/ -v --cov=src --cov-report=term

  test-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd check-service
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd check-service
          pytest tests/ -v --cov=app --cov-report=term

  test-orchestration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd orchestration-service
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd orchestration-service
          pytest tests/ -v --cov=app --cov-report=term

  test-progress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd progress-service
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd progress-service
          pytest tests/ -v --cov=app --cov-report=term

  # test-frontend:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: "18"
  #     - name: Install dependencies
  #       run: |
  #         cd frontend
  #         npm ci
  #     - name: Run tests
  #       run: |
  #         cd frontend
  #         npm test -- --watchAll=false --passWithNoTests

  # ==========================================================================
  # BUILD STAGE
  # ==========================================================================

  build-auth:
    runs-on: ubuntu-latest
    needs: [test-auth]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/auth-service:${{ github.sha }}
            ghcr.io/${{ github.repository }}/auth-service:latest

  build-task:
    runs-on: ubuntu-latest
    needs: [test-task]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./task-service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/task-service:${{ github.sha }}
            ghcr.io/${{ github.repository }}/task-service:latest

  build-check:
    runs-on: ubuntu-latest
    needs: [test-check]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./check-service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/check-service:${{ github.sha }}
            ghcr.io/${{ github.repository }}/check-service:latest

  build-orchestration:
    runs-on: ubuntu-latest
    needs: [test-orchestration]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./orchestration-service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/orchestration-service:${{ github.sha }}
            ghcr.io/${{ github.repository }}/orchestration-service:latest

  build-progress:
    runs-on: ubuntu-latest
    needs: [test-progress]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./progress-service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/progress-service:${{ github.sha }}
            ghcr.io/${{ github.repository }}/progress-service:latest

  build-frontend:
    runs-on: ubuntu-latest
    needs: [test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest

